services:
  - type: web
    name: socialposter
    runtime: python3
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn --workers 1 --timeout 120 --bind 0.0.0.0:$PORT socialposter.web.app:create_app
    envVars:
      - key: SOCIALPOSTER_SECRET_KEY
        generateValue: true
      - key: SOCIALPOSTER_ENCRYPTION_KEY
        generateValue: true
      - key: FLASK_APP
        value: socialposter.web.app:create_app
      - key: FLASK_ENV
        value: production
      - key: PYTHON_VERSION
        value: "3.12"
databases:
  - name: socialposter-db
    databaseName: socialposter
    user: socialposter
