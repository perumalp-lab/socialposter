services:
  - type: web
    name: socialposter
    runtime: python3
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn --workers 1 --bind 0.0.0.0:$PORT socialposter.web.app:create_app
    envVars:
      - key: SOCIALPOSTER_SECRET_KEY
        generateValue: true
      - key: SOCIALPOSTER_ENCRYPTION_KEY
        generateValue: true
      - key: SOCIALPOSTER_DATA_DIR
        value: /opt/render/project/.socialposter
      - key: FLASK_APP
        value: socialposter.web.app:create_app
      - key: PYTHON_VERSION
        value: "3.12"
    disk:
      name: socialposter-data
      mountPath: /opt/render/project/.socialposter
      sizeGB: 1
