{% extends "base.html" %}

{% block title %}Log In – KRYPTAMS{% endblock %}

{% block content %}
<main class="auth-container">
  <div class="auth-card card">
    <h1 class="auth-title">Log In</h1>

    {% with messages = get_flashed_messages(with_categories=true) %}
      {% for category, message in messages %}
        <div class="alert alert-{{ category }}">{{ message }}</div>
      {% endfor %}
    {% endwith %}

    <form method="POST" action="{{ url_for('auth.login') }}">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}"/>
      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" required placeholder="you@example.com" />
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" required placeholder="Your password" />
      </div>
      <div style="display: flex; align-items: center; gap: 6px; margin-bottom: 20px;">
        <input type="checkbox" id="remember" name="remember" style="width: 18px; height: 18px; cursor: pointer;" />
        <label for="remember" style="margin: 0; cursor: pointer; font-size: 0.9rem;">Remember me</label>
      </div>
      <button type="submit" class="btn btn-primary btn-block">Log In</button>
    </form>

    <p class="auth-footer">
      Don't have an account? <a href="{{ url_for('auth.signup') }}">Sign up</a>
    </p>
  </div>
</main>

<script>
  // Preserve email field on page load (for when login fails and page reloads)
  document.addEventListener('DOMContentLoaded', function() {
    var emailInput = document.getElementById('email');
    var savedEmail = localStorage.getItem('sp_login_email');
    if (savedEmail && emailInput) {
      emailInput.value = savedEmail;
    }
    
    // Save email when form is submitted
    var form = document.querySelector('form');
    if (form && emailInput) {
      form.addEventListener('submit', function() {
        localStorage.setItem('sp_login_email', emailInput.value);
      });
    }
  });
</script>
{% endblock %}
