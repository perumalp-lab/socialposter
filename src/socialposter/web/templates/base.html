<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#6366f1" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <link rel="apple-touch-icon" href="{{ url_for('static', filename='icons/apple-touch-icon-180.png') }}" />
  <link rel="manifest" href="{{ url_for('static', filename='manifest.json') }}" />
  <link rel="icon" href="{{ url_for('static', filename='icons/favicon.ico') }}" />
  <title>{% block title %}SocialPoster{% endblock %}</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
</head>
<body class="{% block body_class %}{% endblock %}">
  <!-- Top Nav -->
  <header class="topbar">
    <div class="topbar-inner">
      <div class="logo">
        <svg width="28" height="28" viewBox="0 0 28 28" fill="none">
          <rect width="28" height="28" rx="8" fill="#6366f1"/>
          <path d="M8 14l4 4 8-8" stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        <span>SocialPoster</span>
      </div>
      <button class="hamburger" id="hamburger-btn" aria-label="Toggle menu">
        <span></span><span></span><span></span>
      </button>
      {% block topbar_nav %}{% endblock %}
      {% block topbar_actions %}{% endblock %}
    </div>
  </header>

  <!-- Bottom Navigation (mobile) -->
  {% block bottom_bar %}{% endblock %}

  {% block content %}{% endblock %}

  {% block scripts %}{% endblock %}
</body>
</html>
