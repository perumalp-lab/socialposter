<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#6366f1" />
  <title>Offline – SocialPoster</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f8fafc;
      color: #0f172a;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 24px;
      text-align: center;
    }
    .offline-icon {
      width: 80px;
      height: 80px;
      border-radius: 20px;
      background: #6366f1;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 24px;
    }
    h1 { font-size: 1.5rem; font-weight: 700; margin-bottom: 8px; }
    p { color: #64748b; font-size: 0.95rem; margin-bottom: 24px; max-width: 400px; }
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 10px 24px;
      background: #6366f1;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
    }
    .btn:hover { background: #4f46e5; }
  </style>
</head>
<body>
  <div class="offline-icon">
    <svg width="40" height="40" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round">
      <path d="M4 4l32 32"/>
      <path d="M8.5 12.5a20 20 0 0 1 23 0"/>
      <path d="M13 17.5a14 14 0 0 1 14 0"/>
      <path d="M17.5 22.5a8 8 0 0 1 5 0"/>
      <circle cx="20" cy="28" r="2" fill="#fff"/>
    </svg>
  </div>
  <h1>You're Offline</h1>
  <p>SocialPoster needs an internet connection to load your platforms and publish posts. Please check your connection and try again.</p>
  <button class="btn" onclick="location.reload()">
    <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M1 4v5h5"/><path d="M3.5 12a7 7 0 1 0 1-9.5L1 4"/></svg>
    Try Again
  </button>
</body>
</html>
